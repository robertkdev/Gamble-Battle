      scene: "res://tests/visual/Sprint3VisualCapture.tscn"
      build: "codex/019f7d5d-592-task"
    evidence:
      required_cameras: [player]
      required_layers: [final]
      required_states: [title, main_menu, combat_vfx, victory, defeat]
      required_viewports: [compact-1280x720]
      required_events: [vfx_timeline]
      min_temporal_frames: 3
      require_runtime_provenance: true
      required_runtime_fields: [entrypoint, scene, build]
      max_source_age_seconds: 600
